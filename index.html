<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f1a" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%237c3aed'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='38' font-family='system-ui' fill='white' font-weight='700'%3Ek%3C/text%3E%3C/svg%3E" />
    <title>OpenClaw Avatar</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        height: 100vh;
        height: 100dvh;
      }
      button,
      textarea {
        touch-action: manipulation;
      }
      /* Prevent iOS Safari from zooming when focusing inputs */
      @media (max-width: 767px) {
        textarea,
        input {
          font-size: 16px !important;
        }
      }
      /* drei's <Stats /> hardcodes position:fixed top:0 left:0 inline.
         Override so it sits in the bottom-right of our chosen container
         and scales up for readability. */
      .avatar-stats {
        position: absolute !important;
        top: auto !important;
        left: auto !important;
        right: 0 !important;
        bottom: 0 !important;
        transform: scale(2);
        transform-origin: bottom right;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
